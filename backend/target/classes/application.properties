# Server Configuration
server.port=8080

# Database Configuration - SQLite
spring.datasource.url=jdbc:sqlite:file:/tmp/quickconnect.db
spring.datasource.driverClassName=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect

# JWT Configuration
jwt.secret=mySecretKeyForQuickConnectApplicationPleaseChangeInProduction
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.quickconnect=DEBUG

# Application Name
spring.application.name=Quick Connect Backend
